# poweroffd configuration (Windows)
# See README.md for details

# UDP port to listen on (default: 9, standard WoL port)
port = 9

# Bind address (0.0.0.0 for all interfaces)
bind = 0.0.0.0

# Target MAC address — only accept packets for this MAC
# If unset, accepts packets for ANY MAC (not recommended)
# mac = AA:BB:CC:DD:EE:FF

# Lock MAC address — sending a packet for this MAC will lock the screen
# instead of shutting down. Use a different MAC than the shutdown MAC.
# lock_mac = BB:CC:DD:EE:FF:00

# HMAC-SHA256 secret for packet authentication
# STRONGLY RECOMMENDED — without this, anyone on the network can shut you down
# secret = change-me-to-something-random

# Seconds to wait before shutting down
delay = 5
